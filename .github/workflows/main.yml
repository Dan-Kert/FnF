name: Multiplatform Game Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  HAXE_VERSION: 4.3.4

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-24.04]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Cache haxelib dependencies
        uses: actions/cache@v4
        with:
          path: .haxelib
          key: haxelib-v2-${{ matrix.os }}-${{ env.HAXE_VERSION }}-${{ hashFiles('hmm.json') }}

      - name: Install Dependencies & Rebuild Tools
        shell: bash
        run: |
          TARGET=linux
          if [ "${{ matrix.os }}" = "windows-2022" ]; then
            TARGET=windows
          fi
          bash .github/scripts/install-deps.sh "$TARGET"

      - name: Compile Game
        shell: bash
        run: |
          haxelib run lime build ${{ matrix.os == 'windows-2022' && 'windows' || 'linux' }} -release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Funkin-${{ matrix.os }}
          path: export/release/**

  build-android:
    name: Build for Android
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK & SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK (r21e)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Cache haxelib dependencies
        uses: actions/cache@v4
        with:
          path: .haxelib
          key: haxelib-android-v2-${{ env.HAXE_VERSION }}-${{ hashFiles('hmm.json') }}

      - name: Install Dependencies & Build Android
        shell: bash
        run: bash .github/scripts/install-deps.sh android

      - name: Compile APK
        shell: bash
        run: |
          haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Funkin-Android
          path: export/**/*.apk

  build-html5:
    name: Build for HTML5 (Web)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Cache haxelib dependencies
        uses: actions/cache@v4
        with:
          path: .haxelib
          key: haxelib-html5-v2-${{ env.HAXE_VERSION }}-${{ hashFiles('hmm.json') }}

      - name: Install Dependencies
        shell: bash
        run: bash .github/scripts/install-deps.sh linux

      - name: Compile HTML5
        shell: bash
        run: haxelib run lime build html5 -release

      - name: Zip HTML5 Build
        shell: bash
        run: |
          cd export/release/html5/bin
          zip -r "$GITHUB_WORKSPACE/Funkin-HTML5.zip" .

      - name: Upload HTML5 ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Funkin-HTML5
          path: Funkin-HTML5.zip
